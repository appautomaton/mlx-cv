name: Test

# TEMP DIAGNOSTIC v2: mlx-cpu JIT-compiles fused CPU kernels via system g++,
# which fails on ubuntu (redeclaration of _Float128). Test two setup fixes.

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Unit + spine contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]" "mlx[cpu]"

      - name: Candidate A — MLX_DISABLE_COMPILE=1 (no JIT)
        continue-on-error: true
        env:
          MLX_DISABLE_COMPILE: "1"
        run: python -m pytest -q -p no:cacheprovider

      - name: Candidate B — JIT with clang
        continue-on-error: true
        env:
          CC: clang
          CXX: clang++
        run: python -m pytest -q -p no:cacheprovider
